name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: cmd

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Visual C++ Redistributable (for runtime)
      run: |
        # VC++ runtime is included in windows-latest

    - name: Build executable with PyInstaller (onedir mode - better DLL handling)
      shell: cmd
      run: |
        pyinstaller --onedir --windowed --noconfirm --clean ^
          --name "OBS_AimBot" ^
          --version-file version_info.txt ^
          --hidden-import=ultralytics ^
          --hidden-import=cv2 ^
          --hidden-import=numpy ^
          --hidden-import=tkinter ^
          --hidden-import=pynput ^
          --hidden-import=torch ^
          --hidden-import=torchvision ^
          --hidden-import=ultralytics.nn.tasks ^
          --hidden-import=ultralytics.models.yolo.detect ^
          --hidden-import=ultralytics.models.yolo.pose ^
          --collect-all=ultralytics ^
          --collect-all=torch ^
          --collect-all=torchvision ^
          --collect-binaries=opencv-python ^
          --collect-binaries=numpy ^
          --collect-binaries=torch ^
          --add-data "requirements.txt;." ^
          aimbot.py

    - name: Verify DLLs in build
      shell: cmd
      run: |
        dir dist\OBS_AimBot\*.dll
        dir dist\OBS_AimBot\_internal\*.dll /s /b | find /c ".dll"

    - name: Create ZIP archive using PowerShell
      shell: pwsh
      run: |
        Compress-Archive -Path dist\OBS_AimBot -DestinationPath OBS_AimBot_v1.1.0.zip -CompressionLevel Optimal
        Get-Item OBS_AimBot_v1.1.0.zip | Select-Object Name,Length

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OBS_AimBot_Windows
        path: OBS_AimBot_v1.1.0.zip
        retention-days: 30

