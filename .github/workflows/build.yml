name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    defaults:
      run:
        shell: cmd

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create version_info.txt
      run: |
        @echo VSVersionInfo( > version_info.txt
        @echo   ffi=FixedFileInfo( >> version_info.txt
        @echo     filevers=(1, 1, 0, 0), >> version_info.txt
        @echo     prodvers=(1, 1, 0, 0), >> version_info.txt
        @echo     mask=0x3f, >> version_info.txt
        @echo     flags=0x0, >> version_info.txt
        @echo     OS=0x40004, >> version_info.txt
        @echo     fileType=0x1, >> version_info.txt
        @echo     subtype=0x0, >> version_info.txt
        @echo     date=(0, 0) >> version_info.txt
        @echo     ) >> version_info.txt
        @echo   kids=[ >> version_info.txt
        @echo     StringFileInfo( >> version_info.txt
        @echo       [ >> version_info.txt
        @echo       StringTable( >> version_info.txt
        @echo         u'040904B0', >> version_info.txt
        @echo         [StringStruct(u'CompanyName', u'OBS YOLO AimBot'), >> version_info.txt
        @echo         StringStruct(u'FileDescription', u'OBS YOLO Pose AimBot'), >> version_info.txt
        @echo         StringStruct(u'FileVersion', u'1.1.0'), >> version_info.txt
        @echo         StringStruct(u'InternalName', u'OBS_AimBot'), >> version_info.txt
        @echo         StringStruct(u'LegalCopyright', u'Open Source'), >> version_info.txt
        @echo         StringStruct(u'OriginalFilename', u'OBS_AimBot.exe'), >> version_info.txt
        @echo         StringStruct(u'ProductName', u'OBS YOLO AimBot'), >> version_info.txt
        @echo         StringStruct(u'ProductVersion', u'1.1.0')])])]) >> version_info.txt
        @echo   VarFileInfo([VarStruct(u'Translation', [0x409, 1200])]) >> version_info.txt
        @echo ) >> version_info.txt

    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onedir --windowed --name "OBS_AimBot" ^
          --version-file version_info.txt ^
          --hidden-import=ultralytics ^
          --hidden-import=cv2 ^
          --hidden-import=numpy ^
          --hidden-import=tkinter ^
          --hidden-import=pynput ^
          --hidden-import=torch ^
          --hidden-import=torchvision ^
          --hidden-import=ultralytics.nn.tasks ^
          --hidden-import=ultralytics.models.yolo.detect ^
          --hidden-import=ultralytics.models.yolo.pose ^
          --collect-all=ultralytics ^
          --collect-all=torch ^
          --collect-all=torchvision ^
          --add-data "requirements.txt;." ^
          aimbot.py

    - name: Create ZIP archive
      run: |
        7z a OBS_AimBot_v1.1.0.zip -mx=9 dist/OBS_AimBot
        dir dist/OBS_AimBot

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OBS_AimBot_Windows
        path: OBS_AimBot_v1.1.0.zip
        retention-days: 30
