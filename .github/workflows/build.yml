name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download YOLO model (optional, for size reduction)
      run: |
        python -c "from ultralytics import YOLO; YOLO('yolo11n-pose.pt')"

    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "OBS_AimBot" ^
          --hidden-import=ultralytics ^
          --hidden-import=cv2 ^
          --hidden-import=numpy ^
          --hidden-import=tkinter ^
          --hidden-import=pynput ^
          --add-data "requirements.txt;." ^
          aimbot.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OBS_AimBot_Windows
        path: dist/OBS_AimBot.exe
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/OBS_AimBot.exe
        generate_release_notes: true
