name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    defaults:
      run:
        shell: cmd

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create version_info.txt
      run: |
        python -c "
import sys
sys.path.insert(0, 'C:\\hostedtoolcache\\windows\\Python\\3.11.9\\x64\\Lib\\site-packages')
from PyInstaller.utils.win32.versioninfo import VSVersionInfo, FixedFileInfo, StringFileInfo, StringTable, StringStruct, VarFileInfo, VarStruct
info = VSVersionInfo(
  ffi=FixedFileInfo(filevers=(1,1,0,0), prodvers=(1,1,0,0), mask=0x3f, flags=0, OS=0x40004, fileType=0x1, subtype=0, date=(0,0)),
  kids=[
    StringFileInfo([StringTable('040904B0', [
      StringStruct('CompanyName', 'OBS YOLO AimBot'),
      StringStruct('FileDescription', 'OBS YOLO Pose AimBot'),
      StringStruct('FileVersion', '1.1.0'),
      StringStruct('InternalName', 'OBS_AimBot'),
      StringStruct('LegalCopyright', 'Open Source'),
      StringStruct('OriginalFilename', 'OBS_AimBot.exe'),
      StringStruct('ProductName', 'OBS YOLO AimBot'),
      StringStruct('ProductVersion', '1.1.0')
    ])]),
    VarFileInfo([VarStruct('Translation', [0x409, 1200])])
  ])
with open('version_info.txt', 'w') as f:
    f.write(str(info))
print('version_info.txt created successfully')
"""

    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onedir --windowed --name "OBS_AimBot" ^
          --version-file version_info.txt ^
          --hidden-import=ultralytics ^
          --hidden-import=cv2 ^
          --hidden-import=numpy ^
          --hidden-import=tkinter ^
          --hidden-import=pynput ^
          --hidden-import=torch ^
          --hidden-import=torchvision ^
          --hidden-import=ultralytics.nn.tasks ^
          --hidden-import=ultralytics.models.yolo.detect ^
          --hidden-import=ultralytics.models.yolo.pose ^
          --collect-all=ultralytics ^
          --collect-all=torch ^
          --collect-all=torchvision ^
          --add-data "requirements.txt;." ^
          aimbot.py

    - name: Create ZIP archive
      run: |
        7z a OBS_AimBot_v1.1.0.zip -mx=9 dist/OBS_AimBot
        dir dist/OBS_AimBot

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OBS_AimBot_Windows
        path: OBS_AimBot_v1.1.0.zip
        retention-days: 30
