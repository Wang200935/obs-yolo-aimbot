name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    defaults:
      run:
        shell: cmd

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable with PyInstaller (onedir mode)
      run: |
        pyinstaller --onedir --windowed --name "OBS_AimBot" ^
          --hidden-import=ultralytics ^
          --hidden-import=cv2 ^
          --hidden-import=numpy ^
          --hidden-import=tkinter ^
          --hidden-import=pynput ^
          --hidden-import=torch ^
          --hidden-import=torchvision ^
          --hidden-import=ultralytics.nn.tasks ^
          --hidden-import=ultralytics.models.yolo.detect ^
          --hidden-import=ultralytics.models.yolo.pose ^
          --collect-all=ultralytics ^
          --collect-all=torch ^
          --collect-all=torchvision ^
          --add-data "requirements.txt;." ^
          aimbot.py

    - name: Create ZIP archive
      run: |
        7z a OBS_AimBot_v1.1.0.zip -mx=9 dist/OBS_AimBot
        dir dist/OBS_AimBot

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OBS_AimBot_Windows
        path: OBS_AimBot_v1.1.0.zip
        retention-days: 30
